name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Get version from tag
        id: version
        run: |
          VERSION_NAME="${GITHUB_REF#refs/tags/v}"
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "APK_FILE=medicine-tracker-v${VERSION_NAME}.apk" >> $GITHUB_OUTPUT

      - name: Build Release APK
        env:
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
        run: |
          set -o pipefail
          ./gradlew assembleRelease --no-daemon 2>&1 | tee /tmp/gradle.log || {
            tail -60 /tmp/gradle.log | while IFS= read -r line; do echo "::notice::${line}"; done
            exit 1
          }

      - name: Rename APK
        run: |
          APK=$(find app/build/outputs -name "*.apk" -type f | head -1)
          echo "Found: $APK"
          mv "$APK" "app/build/outputs/apk/release/${{ steps.version.outputs.APK_FILE }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.version.outputs.VERSION_NAME }}"
          generate_release_notes: true
          files: app/build/outputs/apk/release/${{ steps.version.outputs.APK_FILE }}
          body: |
            ## medicine-tracker v${{ steps.version.outputs.VERSION_NAME }}

            ### Установка
            1. Скачайте `${{ steps.version.outputs.APK_FILE }}`
            2. Разрешите установку из неизвестных источников в настройках Android
            3. Откройте файл и установите приложение

            ### Требования
            - Android 7.0 (API 24) и выше
            - Bluetooth HC-05 / HC-06 на Arduino
